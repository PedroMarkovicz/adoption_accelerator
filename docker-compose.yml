version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    networks:
      - app-network
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:8501"
    env_file: .env
    environment:
      - BACKEND_API_URL=http://api:8000
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
